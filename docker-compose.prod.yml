services:
  db:
    image: postgres:16-alpine
    container_name: psikologi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-psikologi_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-psikologi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psikologi_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      AUTO_SEED_ADMIN: ${AUTO_SEED_ADMIN:-false}
    ports:
      - "${APP_HTTP_PORT:-8081}:8081"
    volumes:
      - applogs:/app/logs
      - appuploads:/app/static/uploads

volumes:
  pgdata:
  applogs:
  appuploads:
