services:
  db:
    image: postgres:16-alpine
    container_name: psikologi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-psikologi_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-psikologi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psikologi_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      # Seed admin idempotent (lewat jika sudah ada); set false jika tidak ingin auto-create
      AUTO_SEED_ADMIN: ${AUTO_SEED_ADMIN:-true}
      # Override nilai lama di .env.docker (mis. APP_HTTP_PORT=8081) agar selalu sinkron dengan image
      APP_HTTP_PORT: "112"
    ports:
      # Host: pakai HOST_PORT (default 112). Jangan pakai APP_HTTP_PORT dari .env.docker untuk bind — sering masih 8081.
      - "${HOST_PORT:-112}:112"
    volumes:
      - applogs:/app/logs
      - appuploads:/app/static/uploads

volumes:
  pgdata:
  applogs:
  appuploads:
