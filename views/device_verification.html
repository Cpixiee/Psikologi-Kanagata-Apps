<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verifikasi Perangkat - Psychee Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/icons/icon_psikologi_kanagata.png">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .verification-card {
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verification-card p-5">
            <div class="text-center mb-4">
                <img src="/static/icons/icon_psikologi_kanagata.png" alt="Psychee Wellness" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                <h3 class="mt-3">Psychee Wellness</h3>
            </div>
            
            {{if .Error}}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{.Error}}
            </div>
            {{else if .Success}}
            <div class="alert alert-{{if .IsReject}}danger{{else}}success{{end}}">
                <i class="bi bi-{{if .IsReject}}x-circle{{else}}check-circle{{end}} me-2"></i>
                {{.Message}}
            </div>
            <div class="text-center mt-4">
                <a href="/login" class="btn btn-primary">Kembali ke Login</a>
            </div>
            {{else}}
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Memproses...</span>
                </div>
            </div>
            {{end}}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
