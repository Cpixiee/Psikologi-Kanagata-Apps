                    <div class="col-md-6 mb-3"><label class="form-label">No. Handphone</label><div class="form-control bg-light"><span id="profilePhone">-</span></div></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Asal Instansi</label><div class="form-control bg-light"><span id="profileSchool">-</span></div></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Email</label><div class="form-control bg-light"><span id="profileEmail">-</span></div></div>

    <script src="/static/sneat/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/sneat/assets/vendor/libs/popper/popper.js"></script>

    <script src="/static/sneat/assets/vendor/js/menu.js"></script>
    <script src="/static/sneat/assets/js/main.js"></script>
    <script>
      async function loadProfile() {
        const response = await fetch('/api/profile');
        if (!response.ok) return;
        const data = await response.json();
        if (!data.success || !data.data) return;
        const user = data.data;
        document.getElementById('profileName').textContent = user.nama_lengkap || '-';
        document.getElementById('profilePhone').textContent = user.no_handphone || '-';
        document.getElementById('profileEmail').textContent = user.email || '-';
        if (user.foto_profil) {
          document.getElementById('profilePhoto').src = '/static/uploads/profiles/' + user.foto_profil;
        }
        const summaryResp = await fetch('/api/profile/test-summary');
        if (summaryResp.ok) {
          const summaryData = await summaryResp.json();
          if (summaryData.success && summaryData.data && summaryData.data.last_institution) {
            document.getElementById('profileSchool').textContent = summaryData.data.last_institution;
          }
        }
      }
      async function loadRoleMenu() {
        try {
          const response = await fetch('/api/profile');
          if (!response.ok) return;
          const data = await response.json();
          if (data.success && data.data && data.data.role === 'admin') {
            const adminMenu = document.getElementById('menuAdminPsychotest');
            if (adminMenu) adminMenu.classList.remove('d-none');
          }
        } catch (_) {}
      }
      document.addEventListener('DOMContentLoaded', function () {
        loadProfile();
        loadRoleMenu();
      });
    </script>
  </body>
