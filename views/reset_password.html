<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Psychee Wellness</title>
    <link rel="icon" type="image/png" href="/static/icons/icon_psikologi_kanagata.png">
    <link rel="stylesheet" href="/static/tailwind/output.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-8">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-soft-xl p-8">
            <header class="flex flex-col items-center gap-3 text-center mb-6">
                <div class="relative">
                    <img src="/static/icons/icon_psikologi_kanagata.png" alt="Psychee Wellness"
                         class="w-12 h-12 rounded-full shadow-sm object-cover">
                </div>
                <div class="flex flex-col items-center leading-tight">
                    <span class="text-lg font-semibold tracking-wide text-slate-900">Reset Password</span>
                    <span class="text-xs text-slate-500">Masukkan email dan kode OTP untuk reset password</span>
                </div>
            </header>

            <!-- Step 1: Request OTP -->
            <div id="step1" class="space-y-4">
                <div>
                    <h2 class="text-xl font-semibold text-slate-900 mb-2">Request Kode OTP</h2>
                    <p class="text-sm text-slate-600">Masukkan email Anda untuk menerima kode OTP</p>
                </div>
                <form id="requestOtpForm" class="space-y-4">
                    <div class="space-y-1.5">
                        <label for="requestEmail" class="text-sm font-medium text-slate-800">Email <span class="text-rose-500">*</span></label>
                        <input type="email" id="requestEmail" name="email" required
                               class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 placeholder:text-slate-400"
                               placeholder="nama@email.com">
                    </div>
                    <button type="submit" id="requestBtn"
                            class="w-full inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-r from-indigo-600 to-sky-500 text-sm font-semibold text-white py-2.5 shadow-md hover:shadow-lg hover:brightness-105 active:brightness-95 transition disabled:opacity-60 disabled:cursor-not-allowed">
                        Kirim Kode OTP
                    </button>
                </form>
            </div>

            <!-- Step 2: Verify OTP and Reset Password -->
            <div id="step2" class="space-y-4 hidden">
                <div>
                    <h2 class="text-xl font-semibold text-slate-900 mb-2">Verifikasi OTP & Reset Password</h2>
                    <p class="text-sm text-slate-600">Masukkan kode OTP yang telah dikirim ke email Anda</p>
                </div>
                <form id="resetPasswordForm" class="space-y-4">
                    <input type="hidden" id="resetEmail" name="email">
                    <div class="space-y-1.5">
                        <label for="otpCode" class="text-sm font-medium text-slate-800">Kode OTP <span class="text-rose-500">*</span></label>
                        <input type="text" id="otpCode" name="otp_code" required maxlength="6"
                               class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 placeholder:text-slate-400 text-center text-2xl tracking-widest"
                               placeholder="000000">
                        <p class="text-xs text-slate-500">Masukkan 6 digit kode OTP</p>
                    </div>
                    <div class="space-y-1.5">
                        <label for="newPassword" class="text-sm font-medium text-slate-800">Password Baru <span class="text-rose-500">*</span></label>
                        <input type="password" id="newPassword" name="password" required minlength="6"
                               class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 placeholder:text-slate-400"
                               placeholder="Minimal 6 karakter">
                    </div>
                    <div class="space-y-1.5">
                        <label for="confirmPassword" class="text-sm font-medium text-slate-800">Konfirmasi Password <span class="text-rose-500">*</span></label>
                        <input type="password" id="confirmPassword" name="confirm_password" required minlength="6"
                               class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 placeholder:text-slate-400"
                               placeholder="Ulangi password baru">
                    </div>
                    <button type="submit" id="resetBtn"
                            class="w-full inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-r from-indigo-600 to-sky-500 text-sm font-semibold text-white py-2.5 shadow-md hover:shadow-lg hover:brightness-105 active:brightness-95 transition disabled:opacity-60 disabled:cursor-not-allowed">
                        Reset Password
                    </button>
                </form>
            </div>

            <div class="mt-6 text-center">
                <a href="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">
                    ← Kembali ke Login
                </a>
            </div>
        </div>
    </div>

    <script>
        let userEmail = '';

        // Request OTP
        document.getElementById('requestOtpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('requestEmail').value;
            const submitBtn = document.getElementById('requestBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Mengirim...';
            
            try {
                const response = await fetch('/api/auth/request-reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil!',
                        text: data.message,
                        confirmButtonColor: '#0d6efd'
                    });
                    userEmail = email;
                    document.getElementById('resetEmail').value = email;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal',
                        text: data.message,
                        confirmButtonColor: '#dc3545'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Terjadi kesalahan. Silakan coba lagi.',
                    confirmButtonColor: '#dc3545'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Reset Password
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const otpCode = document.getElementById('otpCode').value;
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Password dan konfirmasi password tidak cocok',
                    confirmButtonColor: '#dc3545'
                });
                return;
            }
            
            if (password.length < 6) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Password minimal 6 karakter',
                    confirmButtonColor: '#dc3545'
                });
                return;
            }
            
            const submitBtn = document.getElementById('resetBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Memproses...';
            
            try {
                const response = await fetch('/api/auth/verify-reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        otp_code: otpCode,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil!',
                        text: data.message,
                        confirmButtonColor: '#0d6efd'
                    }).then(() => {
                        window.location.href = '/login';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal',
                        text: data.message,
                        confirmButtonColor: '#dc3545'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Terjadi kesalahan. Silakan coba lagi.',
                    confirmButtonColor: '#dc3545'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Auto format OTP input
        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
