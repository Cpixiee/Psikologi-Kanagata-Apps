<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pekerjaan Impian - Tes Holland</title>
    <link rel="stylesheet" href="/static/sneat/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/sneat/assets/css/demo.css" />
    <style>
      .holland-title {
        font-weight: 650;
        color: #2d3748;
        margin-bottom: 0.25rem;
      }
      .holland-subtitle {
        color: #6b7280;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container-xxl py-4">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card shadow-sm">
            <div class="card-header text-center">
              <h5 class="mb-0 holland-title">Halaman 3</h5>
              <div class="holland-subtitle">Isikan 3 pekerjaan impian serta subjek favorit/kurang disukai</div>
            </div>
            <div class="card-body">
              {{if .Error}}
              <div class="alert alert-danger">{{.Error}}</div>
              {{else}}
              <form id="formHollandPage3">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Silahkan tuliskan 3 pekerjaan impian Anda :</label>
                  <input type="text" class="form-control mb-2" name="dream_job_1" id="dream_job_1" placeholder="Pekerjaan impian 1" />
                  <input type="text" class="form-control mb-2" name="dream_job_2" id="dream_job_2" placeholder="Pekerjaan impian 2" />
                  <input type="text" class="form-control" name="dream_job_3" id="dream_job_3" placeholder="Pekerjaan impian 3" />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Silahkan tuliskan Subjek favorit Anda :</label>
                  <input type="text" class="form-control" name="favorite_subject" id="favorite_subject" placeholder="Contoh: Biologi" />
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold">Silakan tuliskan subjek yang paling tidak Anda sukai:</label>
                  <input type="text" class="form-control" name="disliked_subject" id="disliked_subject" placeholder="Contoh: Matematika" />
                </div>

                <button type="button" id="btnSubmitPage3" class="btn btn-success w-100">
                  Simpan &amp; Selesaikan Tes
                </button>
              </form>
              {{end}}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
      <div id="hollandToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="hollandToastBody">...</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script src="/static/sneat/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/sneat/assets/vendor/js/bootstrap.js"></script>
    <script>
      (function () {
        const btn = document.getElementById('btnSubmitPage3');
        const form = document.getElementById('formHollandPage3');
        if (!btn || !form) return;

        function showToast(message, variant) {
          const toastEl = document.getElementById('hollandToast');
          const bodyEl = document.getElementById('hollandToastBody');
          if (!toastEl || !bodyEl || !window.bootstrap) return;
          bodyEl.textContent = message || '';
          toastEl.classList.remove('text-bg-primary', 'text-bg-success', 'text-bg-danger', 'text-bg-warning');
          const v = (variant || 'primary').toLowerCase();
          if (v === 'success') toastEl.classList.add('text-bg-success');
          else if (v === 'danger' || v === 'error') toastEl.classList.add('text-bg-danger');
          else if (v === 'warning') toastEl.classList.add('text-bg-warning');
          else toastEl.classList.add('text-bg-primary');
          const t = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 2500 });
          t.show();
        }

        function valOf(id) {
          const el = document.getElementById(id);
          return (el && el.value) ? el.value.trim() : '';
        }

        btn.addEventListener('click', async function () {
          document.getElementById('dream_job_1').classList.remove('border-danger');
          document.getElementById('dream_job_2').classList.remove('border-danger');
          document.getElementById('dream_job_3').classList.remove('border-danger');
          document.getElementById('favorite_subject').classList.remove('border-danger');
          document.getElementById('disliked_subject').classList.remove('border-danger');

          const dream1 = valOf('dream_job_1');
          const dream2 = valOf('dream_job_2');
          const dream3 = valOf('dream_job_3');
          const fav = valOf('favorite_subject');
          const dis = valOf('disliked_subject');

          const missing = [];
          if (!dream1) missing.push('dream_job_1');
          if (!dream2) missing.push('dream_job_2');
          if (!dream3) missing.push('dream_job_3');
          if (!fav) missing.push('favorite_subject');
          if (!dis) missing.push('disliked_subject');

          if (missing.length > 0) {
            missing.forEach(function (id) {
              const el = document.getElementById(id);
              if (el) el.classList.add('border-danger');
            });
            showToast('Semua isian page 3 harus diisi.', 'danger');
            document.getElementById(missing[0]).scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }

          const payload = {
            dream_job_1: dream1,
            dream_job_2: dream2,
            dream_job_3: dream3,
            favorite_subject: fav,
            disliked_subject: dis,
            force_submit: false
          };

          try {
            const res = await fetch('/api/test/holland/page3', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!data || !data.success) {
              showToast((data && data.message) ? data.message : 'Gagal menyimpan jawaban', 'danger');
              return;
            }
            window.location.href = data.finish_redirect || '/profile';
          } catch (e) {
            showToast('Terjadi error saat mengirim jawaban', 'danger');
          }
        });
      })();
    </script>
  </body>
</html>
