<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tes IST Selesai - Psychee Wellness</title>
    <link rel="stylesheet" href="/static/sneat/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/sneat/assets/css/demo.css" />
  </head>
  <body class="bg-light">
    <div class="container-xxl py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header text-center bg-success text-white">
              <h5 class="mb-0">Tes IST Selesai</h5>
            </div>
            <div class="card-body">
              {{if .Error}}
              <div class="alert alert-warning">
                {{.Error}}
              </div>
              {{else}}
              <div class="alert alert-success">
                Jawaban kamu sudah tersimpan. Terima kasih sudah mengerjakan tes.
              </div>
              {{end}}
              <p class="text-muted mb-4">
                Silakan klik tombol di bawah untuk melihat hasil tes atau kembali ke dashboard.
              </p>
              <div class="d-grid gap-2">
                <a href="/test/ist/result" class="btn btn-primary">Lihat Hasil Tes</a>
                <a href="/dashboard" class="btn btn-outline-secondary">Kembali ke Dashboard</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
