<!doctype html>
<html lang="id" class="layout-menu-fixed layout-compact" data-assets-path="/static/sneat/assets/" data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>Mulai Tes Gaya Belajar (VAK)</title>
    <link rel="icon" type="image/png" href="/static/icons/icon_psikologi_kanagata.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/sneat/assets/vendor/fonts/iconify-icons.css" />
    <link rel="stylesheet" href="/static/sneat/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/sneat/assets/css/demo.css" />
    <link rel="stylesheet" href="/static/sneat/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
    <script src="/static/sneat/assets/vendor/js/helpers.js"></script>
    <script src="/static/sneat/assets/js/config.js"></script>
    <style>
      .vak-shell {
        width: 100%;
        max-width: 860px;
        margin-left: auto;
        margin-right: auto;
      }
      /* Sneat layout assumes sidebar; VAK pages don't use it. */
      .layout-container {
        padding-left: 0 !important;
      }
      .layout-page {
        margin-left: 0 !important;
        padding-left: 0 !important;
      }
    </style>
  </head>
  <body>
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <div class="layout-page">
          <div class="content-wrapper">
            <div class="container-xxl flex-grow-1 container-p-y">
              <div class="vak-shell">
                <div class="card">
                    <div class="card-body">
                      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                        <div>
                          <h4 class="fw-bold mb-1">Tes Gaya Belajar (VAK)</h4>
                          <p class="text-muted mb-0">Lengkapi biodata sebelum memulai tes.</p>
                        </div>
                        <a href="/test" class="btn btn-outline-secondary btn-sm">
                          <i class="bx bx-arrow-back me-1"></i>Kembali
                        </a>
                      </div>

                      {{if .Error}}
                        <div class="alert alert-danger">{{.Error}}</div>
                      {{end}}

                      <form method="post" action="/test/learning-style/start" class="mt-2">
                        <div class="row">
                          <div class="col-md-6 mb-3">
                            <label class="form-label">Nama</label>
                            <input type="text" name="name" class="form-control" placeholder="Nama lengkap" required />
                          </div>
                          <div class="col-md-6 mb-3">
                            <label class="form-label">Usia</label>
                            <input type="number" name="age" class="form-control" placeholder="Contoh: 17" min="1" max="120" required />
                          </div>
                          <div class="col-md-6 mb-3">
                            <label class="form-label">Asal Instansi</label>
                            <input type="text" name="institution" class="form-control" placeholder="Sekolah / Kampus / Instansi" required />
                            <div class="form-text">Akan dipakai sebagai “Pendidikan” di resume.</div>
                          </div>
                          <div class="col-md-6 mb-3">
                            <label class="form-label">Jenis Kelamin</label>
                            <select name="gender" class="form-select" required>
                              <option value="" selected disabled>Pilih</option>
                              <option value="laki-laki">Laki-laki</option>
                              <option value="perempuan">Perempuan</option>
                            </select>
                          </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                          Lanjut ke Instruksi
                        </button>
                      </form>
                    </div>
                  </div>
              </div>
            </div>
          </div>
          <div class="content-backdrop fade"></div>
        </div>
      </div>
    </div>

    <script src="/static/sneat/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/sneat/assets/vendor/libs/popper/popper.js"></script>
    <script src="/static/sneat/assets/vendor/js/bootstrap.js"></script>
    <script src="/static/sneat/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/static/sneat/assets/vendor/js/menu.js"></script>
    <script src="/static/sneat/assets/js/main.js"></script>
  </body>
</html>
